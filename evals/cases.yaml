    behavior_focus: "avoid unnecessary search"
    grading_notes: "Correct iff the explanation notes affect is usually a verb and effect usually a noun, and the agent does NOT call the tool."

  # ------------------------------------------------------------------ #
  # typo_or_paraphrase (4)                                             #
  # ------------------------------------------------------------------ #

  - id: tp_01
    category: typo_or_paraphrase
    difficulty: easy
    question: "Who was Albert Einstien?"
    should_search: true
    expected_pages: ["Albert Einstein"]
    required_answer_terms: ["physicist"]
    forbidden_terms: []
