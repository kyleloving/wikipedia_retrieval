    difficulty: medium
    question: "What was Isaac Newton's shoe size?"
    should_search: true
    expected_pages: ["Isaac Newton"]
    required_answer_terms: []
    forbidden_terms: []
    expected_behavior: "Search, find nothing, and state the evidence is insufficient."
    behavior_focus: "refuse when unsupported"
    grading_notes: "Correct iff the agent declines to fabricate a shoe size."

  - id: ins_05
    category: insufficient_evidence
    difficulty: medium
    question: "What was Marie Curie's favorite color?"
    should_search: true
    expected_pages: ["Marie Curie"]
    required_answer_terms: []
    forbidden_terms: []
    expected_behavior: "Search, find nothing about a favorite color, and say the information is not available."
    behavior_focus: "refuse when unsupported"
    grading_notes: "Correct iff the agent does not invent a color and notes the lack of evidence."

  - id: ins_06
    category: insufficient_evidence
    difficulty: hard
    question: "On what exact date did Socrates first meet Plato?"
    should_search: true
    expected_pages: ["Socrates", "Plato"]
    required_answer_terms: []
    forbidden_terms: []
    expected_behavior: "Search, recognize that no such record exists, and explain the date is not documented."
    behavior_focus: "refuse when unsupported (no surviving record)"
    grading_notes: "Correct iff the agent explains the exact date is not knowable/documented. Inventing a date is a failure."

  - id: ins_07
    category: insufficient_evidence
    difficulty: medium
    question: "What was the name of William Shakespeare's family dog?"
    should_search: true
    expected_pages: ["William Shakespeare"]
    required_answer_terms: []
    forbidden_terms: []
    expected_behavior: "Search, find nothing, and state the information is not available."
    behavior_focus: "refuse when unsupported"
    grading_notes: "Correct iff the agent declines to invent a dog's name and notes the lack of evidence."

