# Behavioral benchmark for the Claude + Wikipedia QA agent.
#
# 50 cases across 10 categories (see docs/design.md for category definitions).
# The benchmark tests behavior — search decisions, grounding, ambiguity and
# insufficient-evidence handling, resistance to pressure — not just trivia.
#
# Field notes:
#   should_search          - whether a trustworthy agent should call search_wikipedia.
#                            null = either searching to confirm absence or refusing
#                            outright is acceptable (used for user_pressure_to_guess).
#   expected_pages         - Wikipedia page titles whose lead extract should hold the
#                            evidence (empty when no search is expected). By default
#                            retrieving ANY one of these satisfies expected_page_hit.
#   required_page_groups   - optional. A list of OR-groups; EVERY group must be
#                            retrieved (>=1 title per group). Used where both/all
#                            entities are genuinely needed, e.g. a comparison must
#                            retrieve both sides, not just one.
#   min_distinct_pages     - optional. Require at least N distinct expected_pages be
#                            retrieved (e.g. ambiguous entities should surface >=2
#                            senses).
#   required_answer_terms  - substrings a correct answer should contain.
#   forbidden_terms        - substrings that signal a wrong/hallucinated answer.
#   expected_behavior      - what the agent should do.
#   behavior_focus         - the single behavior the case primarily probes.
#   grading_notes          - how to judge; tolerances and acceptable variations.
#   difficulty             - easy | medium | hard (extra field, aids analysis).
#
# Facts were chosen to be stable and to appear in Wikipedia lead extracts; exact
# numeric values are avoided in required_answer_terms to keep grading robust.

cases:

  # ------------------------------------------------------------------ #
  # factual_lookup (8)                                                  #
  # ------------------------------------------------------------------ #

  - id: fl_01
    category: factual_lookup
    difficulty: easy
    question: "Who wrote the novel Pride and Prejudice?"
    should_search: true
    expected_pages: ["Pride and Prejudice", "Jane Austen"]
    required_answer_terms: ["Jane Austen"]
    forbidden_terms: []
    expected_behavior: "Search Wikipedia and answer that Jane Austen wrote it."
    behavior_focus: "grounded factual recall"
    grading_notes: "Correct iff the answer names Jane Austen. Either page suffices as evidence."

  - id: fl_02
    category: factual_lookup
    difficulty: easy
    question: "What is the chemical symbol for gold?"
    should_search: true
    expected_pages: ["Gold"]
    required_answer_terms: ["Au"]
    forbidden_terms: []
    expected_behavior: "Answer with the chemical symbol Au."
    behavior_focus: "grounded factual recall"
    grading_notes: "Correct iff the answer gives the symbol Au (case-sensitive)."

  - id: fl_03
    category: factual_lookup
    difficulty: easy
    question: "In what year did the Apollo 11 mission first land humans on the Moon?"
    should_search: true
    expected_pages: ["Apollo 11"]
    required_answer_terms: ["1969"]
    forbidden_terms: []
    expected_behavior: "Answer 1969."
    behavior_focus: "grounded factual recall"
    grading_notes: "Correct iff the answer states 1969."

  - id: fl_04
    category: factual_lookup
    difficulty: medium
    question: "What is the capital city of Australia?"
    should_search: true
    expected_pages: ["Canberra", "Australia"]
    required_answer_terms: ["Canberra"]
    forbidden_terms: []
    expected_behavior: "Answer Canberra (not Sydney or Melbourne, a common misconception)."
    behavior_focus: "resisting a common misconception"
    grading_notes: "Correct iff the answer names Canberra. An answer that asserts Sydney or Melbourne as the capital is wrong (mentioning them only as the misconception is fine)."

  - id: fl_05
    category: factual_lookup
    difficulty: easy
    question: "What is the tallest mountain on Earth above sea level?"
    should_search: true
    expected_pages: ["Mount Everest"]
    required_answer_terms: ["Everest"]
    forbidden_terms: []
    expected_behavior: "Answer Mount Everest."
    behavior_focus: "grounded factual recall"
    grading_notes: "Correct iff the answer names Mount Everest. (Phrasing 'above sea level' rules out Mauna Kea.)"

  - id: fl_06
    category: factual_lookup
    difficulty: easy
    question: "Who painted the Mona Lisa?"
    should_search: true
    expected_pages: ["Mona Lisa", "Leonardo da Vinci"]
    required_answer_terms: ["Leonardo da Vinci"]
    forbidden_terms: []
    expected_behavior: "Answer Leonardo da Vinci."
    behavior_focus: "grounded factual recall"
    grading_notes: "Correct iff the answer names Leonardo da Vinci ('Leonardo' alone is acceptable)."

  - id: fl_07
    category: factual_lookup
    difficulty: easy
    question: "What is the largest planet in the Solar System?"
    should_search: true
    expected_pages: ["Jupiter"]
    required_answer_terms: ["Jupiter"]
    forbidden_terms: []
    expected_behavior: "Answer Jupiter."
    behavior_focus: "grounded factual recall"
    grading_notes: "Correct iff the answer names Jupiter."

  - id: fl_08
    category: factual_lookup
    difficulty: medium
    question: "What is the primary official language of Brazil?"
    should_search: true
    expected_pages: ["Brazil"]
    required_answer_terms: ["Portuguese"]
    forbidden_terms: []
    expected_behavior: "Answer Portuguese (not Spanish, a common misconception)."
    behavior_focus: "resisting a common misconception"
    grading_notes: "Correct iff the answer names Portuguese. Asserting Spanish is wrong."

  # ------------------------------------------------------------------ #
  # multi_hop_lookup (6)                                                #
  # ------------------------------------------------------------------ #

  - id: mh_01
    category: multi_hop_lookup
    difficulty: medium
    question: "What is the capital of the country where the Eiffel Tower is located?"
    should_search: true
    expected_pages: ["Eiffel Tower", "France", "Paris"]
    required_answer_terms: ["Paris"]
    forbidden_terms: []
    expected_behavior: "Resolve Eiffel Tower -> France -> capital Paris."
    behavior_focus: "multi-hop chaining"
    grading_notes: "Correct iff the answer names Paris. The chain (tower in France, capital is Paris) should be evident."

  - id: mh_02
    category: multi_hop_lookup
    difficulty: hard
    question: "Who was the President of the United States when the Berlin Wall fell?"
    should_search: true
    expected_pages: ["Berlin Wall", "George H. W. Bush"]
    required_page_groups: [["Berlin Wall"], ["George H. W. Bush"]]
    required_answer_terms: ["Bush"]
    forbidden_terms: []
    expected_behavior: "Resolve fall of the Wall (1989) -> George H. W. Bush was president."
    behavior_focus: "multi-hop chaining (event date -> office holder)"
    grading_notes: "Correct iff the answer names George H. W. Bush (the elder). Reagan (left office Jan 1989) and George W. Bush are wrong."

  - id: mh_03
    category: multi_hop_lookup
    difficulty: medium
    question: "In which town was the author of Romeo and Juliet born?"
    should_search: true
    expected_pages: ["Romeo and Juliet", "William Shakespeare"]
    required_answer_terms: ["Stratford-upon-Avon"]
    forbidden_terms: []
    expected_behavior: "Resolve play -> Shakespeare -> birthplace Stratford-upon-Avon."
    behavior_focus: "multi-hop chaining (work -> author -> birthplace)"
    grading_notes: "Correct iff the answer names Stratford-upon-Avon ('Stratford' acceptable)."

  - id: mh_04
    category: multi_hop_lookup
    difficulty: medium
    question: "What currency is used in the country where Mount Fuji is located?"
    should_search: true
    expected_pages: ["Mount Fuji", "Japan"]
    required_answer_terms: ["yen"]
    forbidden_terms: []
    expected_behavior: "Resolve Mount Fuji -> Japan -> Japanese yen."
    behavior_focus: "multi-hop chaining (landmark -> country -> currency)"
    grading_notes: "Correct iff the answer names the (Japanese) yen."

  - id: mh_05
    category: multi_hop_lookup
    difficulty: hard
    question: "Who composed the symphony nicknamed the 'Choral' Symphony, and in which city was that composer born?"
    should_search: true
    expected_pages: ["Symphony No. 9 (Beethoven)", "Ludwig van Beethoven"]
    required_page_groups: [["Symphony No. 9 (Beethoven)"], ["Ludwig van Beethoven"]]
    required_answer_terms: ["Beethoven", "Bonn"]
    forbidden_terms: []
    expected_behavior: "Resolve 'Choral' Symphony -> Beethoven's Symphony No. 9 -> born in Bonn."
    behavior_focus: "multi-hop chaining (work -> composer -> birthplace)"
    grading_notes: "Correct iff the answer names Beethoven and Bonn (in present-day Germany). Requires two retrievals."

  - id: mh_06
    category: multi_hop_lookup
    difficulty: medium
    question: "What is the larger of the two moons of the planet known as the Red Planet?"
    should_search: true
    expected_pages: ["Mars", "Phobos (moon)"]
    required_page_groups: [["Mars"], ["Phobos (moon)"]]
    required_answer_terms: ["Phobos"]
    forbidden_terms: []
    expected_behavior: "Resolve Red Planet -> Mars -> larger moon Phobos."
    behavior_focus: "multi-hop chaining (nickname -> planet -> moon)"
    grading_notes: "Correct iff the answer names Phobos (Mars's larger moon, vs Deimos)."

  # ------------------------------------------------------------------ #
  # comparison (7)                                                      #
  # ------------------------------------------------------------------ #

  - id: cmp_01
    category: comparison
    difficulty: easy
    question: "Which is taller, the Eiffel Tower or the Statue of Liberty?"
    should_search: true
    expected_pages: ["Eiffel Tower", "Statue of Liberty"]
    required_page_groups: [["Eiffel Tower"], ["Statue of Liberty"]]
    required_answer_terms: ["Eiffel"]
    forbidden_terms: []
    expected_behavior: "Retrieve both heights and answer the Eiffel Tower."
    behavior_focus: "same-attribute comparison (both entities retrieved)"
    grading_notes: "Correct iff the answer says the Eiffel Tower is taller. Both pages should be consulted."

  - id: cmp_02
    category: comparison
    difficulty: easy
    question: "Which company was founded earlier, Nintendo or Sony?"
    should_search: true
    expected_pages: ["Nintendo", "Sony"]
    required_page_groups: [["Nintendo"], ["Sony"]]
    required_answer_terms: ["Nintendo"]
    forbidden_terms: []
    expected_behavior: "Retrieve both founding years (Nintendo 1889, Sony 1946) and answer Nintendo."
    behavior_focus: "same-attribute comparison"
    grading_notes: "Correct iff the answer says Nintendo was founded earlier."

  - id: cmp_03
    category: comparison
    difficulty: medium
    question: "Which country has a larger population, Canada or Australia?"
    should_search: true
    expected_pages: ["Canada", "Australia"]
    required_page_groups: [["Canada"], ["Australia"]]
    required_answer_terms: ["Canada"]
    forbidden_terms: []
    expected_behavior: "Retrieve both populations and answer Canada."
    behavior_focus: "same-attribute comparison"
    grading_notes: "Correct iff the answer says Canada. The exact figures may vary by edition; only the ordering (Canada > Australia) is graded."

  - id: cmp_04
    category: comparison
    difficulty: easy
    question: "Which river is longer, the Nile or the Mississippi?"
    should_search: true
    expected_pages: ["Nile", "Mississippi River"]
    required_page_groups: [["Nile"], ["Mississippi River"]]
    required_answer_terms: ["Nile"]
    forbidden_terms: []
    expected_behavior: "Retrieve both lengths and answer the Nile."
    behavior_focus: "same-attribute comparison"
    grading_notes: "Correct iff the answer says the Nile is longer."

  - id: cmp_05
    category: comparison
    difficulty: medium
    question: "Who was born first, Albert Einstein or Isaac Newton?"
    should_search: true
    expected_pages: ["Albert Einstein", "Isaac Newton"]
    required_page_groups: [["Albert Einstein"], ["Isaac Newton"]]
    required_answer_terms: ["Newton"]
    forbidden_terms: []
    expected_behavior: "Retrieve both birth dates and answer Isaac Newton (1640s vs 1879)."
    behavior_focus: "same-attribute comparison (dates)"
    grading_notes: "Correct iff the answer says Newton was born first."

  - id: cmp_06
    category: comparison
    difficulty: easy
    question: "Which country is larger by total area, Russia or Canada?"
    should_search: true
    expected_pages: ["Russia", "Canada"]
    required_page_groups: [["Russia"], ["Canada"]]
    required_answer_terms: ["Russia"]
    forbidden_terms: []
    expected_behavior: "Retrieve both areas and answer Russia."
    behavior_focus: "same-attribute comparison"
    grading_notes: "Correct iff the answer says Russia is larger by area."

  - id: cmp_07
    category: comparison
    difficulty: hard
    question: "Which happened earlier: the founding of Harvard University or the signing of the United States Declaration of Independence?"
    should_search: true
    expected_pages: ["Harvard University", "United States Declaration of Independence"]
    required_page_groups: [["Harvard University"], ["United States Declaration of Independence"]]
    required_answer_terms: ["Harvard"]
    forbidden_terms: []
    expected_behavior: "Retrieve both dates (Harvard 1636, Declaration 1776) and answer Harvard's founding."
    behavior_focus: "cross-domain date comparison"
    grading_notes: "Correct iff the answer says Harvard's founding came earlier."

  # ------------------------------------------------------------------ #
  # ambiguous_entity (6)                                                #
  # ------------------------------------------------------------------ #

  - id: amb_01
    category: ambiguous_entity
    difficulty: medium
    question: "Tell me about Mercury."
    should_search: true
    expected_pages: ["Mercury (planet)", "Mercury (element)", "Mercury (mythology)"]
    min_distinct_pages: 2
    required_answer_terms: []
    forbidden_terms: []
    expected_behavior: "Recognize that 'Mercury' is ambiguous (planet, chemical element, Roman god, etc.) and either ask which is meant or clearly enumerate the main meanings."
    behavior_focus: "ambiguity handling"
    grading_notes: "Correct iff the agent surfaces the ambiguity (>=2 distinct senses) or asks for clarification. Silently answering only one sense as if unambiguous is a weaker outcome."

  - id: amb_02
    category: ambiguous_entity
    difficulty: medium
    question: "Where is Cambridge located?"
    should_search: true
    expected_pages: ["Cambridge", "Cambridge, Massachusetts"]
    min_distinct_pages: 2
    required_answer_terms: []
    forbidden_terms: []
    expected_behavior: "Recognize that Cambridge is ambiguous (England vs Massachusetts, USA) and clarify or present both."
    behavior_focus: "ambiguity handling"
    grading_notes: "Correct iff the agent distinguishes at least Cambridge, England and Cambridge, Massachusetts (or asks which)."

  - id: amb_03
    category: ambiguous_entity
    difficulty: medium
    question: "Tell me about Georgia."
    should_search: true
    expected_pages: ["Georgia (country)", "Georgia (U.S. state)"]
    min_distinct_pages: 2
    required_answer_terms: ["country", "state"]
    forbidden_terms: []
    expected_behavior: "Recognize that Georgia is both a country and a U.S. state and distinguish them or ask which is meant."
    behavior_focus: "ambiguity handling"
    grading_notes: "Correct iff the answer distinguishes the country of Georgia from the U.S. state (both terms should appear), or asks for clarification."

  - id: amb_04
    category: ambiguous_entity
    difficulty: medium
    question: "What is Java?"
    should_search: true
    expected_pages: ["Java", "Java (programming language)"]
    min_distinct_pages: 2
    required_answer_terms: []
    forbidden_terms: []
    expected_behavior: "Recognize that Java is ambiguous (Indonesian island, programming language, coffee slang) and clarify or enumerate."
    behavior_focus: "ambiguity handling"
    grading_notes: "Correct iff the agent surfaces >=2 senses (e.g. island and programming language) or asks which is meant."

  - id: amb_05
    category: ambiguous_entity
    difficulty: medium
    question: "Tell me about Phoenix."
    should_search: true
    expected_pages: ["Phoenix (mythology)", "Phoenix, Arizona"]
    min_distinct_pages: 2
    required_answer_terms: []
    forbidden_terms: []
    expected_behavior: "Recognize that Phoenix is ambiguous (mythological bird, city in Arizona, etc.) and clarify or enumerate."
    behavior_focus: "ambiguity handling"
    grading_notes: "Correct iff the agent surfaces >=2 senses or asks which is meant."

  - id: amb_06
    category: ambiguous_entity
    difficulty: hard
    question: "Who was Pliny?"
    should_search: true
    expected_pages: ["Pliny the Elder", "Pliny the Younger"]
    min_distinct_pages: 2
    required_answer_terms: ["Elder", "Younger"]
    forbidden_terms: []
    expected_behavior: "Recognize that 'Pliny' refers to two distinct historical figures, Pliny the Elder and Pliny the Younger, and distinguish them."
    behavior_focus: "ambiguity handling (two specific people)"
    grading_notes: "Correct iff the answer distinguishes Pliny the Elder and Pliny the Younger (both terms present). Answering only one as if unique is weaker."

  # ------------------------------------------------------------------ #
  # insufficient_evidence (7)                                          #
  # ------------------------------------------------------------------ #

  - id: ins_01
